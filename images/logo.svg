<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="url(#gradient1)" opacity="0.1"/>

  <!-- Steam waves -->
  <path d="M20 35 Q25 30 30 35 T40 35" stroke="url(#gradient2)" stroke-width="2" fill="none" opacity="0.6">
    <animate attributeName="d"
             values="M20 35 Q25 30 30 35 T40 35;M20 35 Q25 40 30 35 T40 35;M20 35 Q25 30 30 35 T40 35"
             dur="3s"
             repeatCount="indefinite"/>
  </path>
  <path d="M22 30 Q27 25 32 30 T42 30" stroke="url(#gradient2)" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="d"
             values="M22 30 Q27 25 32 30 T42 30;M22 30 Q27 35 32 30 T42 30;M22 30 Q27 25 32 30 T42 30"
             dur="2.5s"
             repeatCount="indefinite"/>
  </path>
  <path d="M24 25 Q29 20 34 25 T44 25" stroke="url(#gradient2)" stroke-width="1.5" fill="none" opacity="0.3">
    <animate attributeName="d"
             values="M24 25 Q29 20 34 25 T44 25;M24 25 Q29 30 34 25 T44 25;M24 25 Q29 20 34 25 T44 25"
             dur="2s"
             repeatCount="indefinite"/>
  </path>

  <!-- Fire/flame element -->
  <path d="M30 45 Q28 40 30 35 Q32 40 30 45 Z" fill="url(#gradient3)">
    <animate attributeName="d"
             values="M30 45 Q28 40 30 35 Q32 40 30 45 Z;M30 45 Q27 40 30 33 Q33 40 30 45 Z;M30 45 Q28 40 30 35 Q32 40 30 45 Z"
             dur="1.5s"
             repeatCount="indefinite"/>
  </path>

  <!-- Text -->
  <text x="65" y="28" font-family="'Playfair Display', serif" font-size="20" font-weight="700" fill="url(#gradient4)">
    Душа Сибири
  </text>
  <text x="65" y="45" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#B8895E" opacity="0.8">
    ПРЕМИУМ ОТДЫХ
  </text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8895E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8895E;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
